[project]
name = "yat"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "alembic>=1.18.4",
    "flask>=3.1.2",
    "flask-wtf>=1.2.0",
    "pillow>=12.1.1",
    "python-dotenv>=1.0.0",
    "reportlab>=4.0.0",
    "shapely>=2.0.0",
    "sqlalchemy>=2.0.48",
    "transformers>=4.48.0,<5.0.0",
    "ultralytics>=8.3.0",
    "torch==2.3.0",
    "torchvision==0.18.0",
    "rapidfuzz>=3.10.0",
]

# PyTorch CUDA index
# Install with: uv pip install --index pytorch-cuda torch torchvision
[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.5",
    "vulture>=2.15",
]