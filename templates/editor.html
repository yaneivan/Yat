<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Редактор сегментов</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body class="editor">

<div id="toolbar">
    <button class="btn" onclick="window.location.href='/'" title="Home">🏠</button>
    {% if project %}
        <button class="btn" onclick="window.location.href='/project/{{ project }}'" title="Назад к проекту">📋 Проект</button>
        <div class="sep"></div>
        <button class="btn" onclick="editor.navigateTo('cropper')" title="Редактор обрезки">✂️ Обрезка</button>
        <button class="btn" onclick="editor.navigateTo('text_editor')" title="Редактор распознавания">🔤 Распознать</button>
    {% else %}
        <button class="btn" onclick="editor.navigateTo('cropper')" title="Редактор обрезки">✂️ Обрезка</button>
        <button class="btn" onclick="editor.navigateTo('text_editor')" title="Редактор распознавания">🔤 Распознать</button>
    {% endif %}
    <div class="sep"></div>
    <button class="btn" onclick="editor.goImage(-1)">&lt;</button>
    <button class="btn" onclick="editor.goImage(1)">&gt;</button>

    <!-- Добавлен ID для обновления через JS -->
    <span id="filename-display" class="file-info" style="font-size:0.9em; color:#aaa; max-width:200px; overflow:hidden; white-space:nowrap;">{{ filename }}</span>

    <div style="flex:1"></div>
    <button class="btn" id="btn-edit" onclick="editor.setMode('edit')">Выделение (V)</button>
    <button class="btn" id="btn-draw" onclick="editor.setMode('draw')">Рисовать (N)</button>
    <div class="sep"></div>
    <button class="btn" id="btn-detect" onclick="editor.detectTextLines()">Авто-разметка</button>
    <button class="btn" id="btn-detect-settings" onclick="editor.showDetectionSettings()">⚙️</button>
    <div class="sep"></div>
    <button class="btn disabled" id="btn-edit-points" onclick="editor.toggleEditPoints()">Точки (P)</button>
    <button class="btn danger disabled" id="btn-delete" onclick="editor.deleteSelected()">Удалить (Del)</button>
    <div class="sep"></div>
    <span id="status-badge" class="status-badge" onclick="statusWidget.openPopover()" style="cursor:pointer; padding:4px 8px; border-radius:4px; font-size:0.85em; font-weight:600;">Загрузка...</span>
</div>

<div id="workspace" oncontextmenu="return false;">
    <canvas id="c"></canvas>
    <div class="help-overlay">ПКМ: Пан | Колесо: Зум | ESC: Отмена | Клик в начало: Замкнуть | Ctrl+A: Всё</div>
</div>

<!-- Status popover -->
<div id="status-popover" class="status-popover dark">
    <h4>Статус:</h4>
    <label class="status-option">
        <input type="radio" name="status" value="uploaded">
        Загружено
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="cropped">
        Обрезано
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="segmented">
        Полигоны готовы
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="recognized">
        Текст распознан
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="reviewed">
        Проверено
    </label>
    <textarea id="status-comment" placeholder="Комментарий..."></textarea>
    <button>Сохранить</button>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/status_widget.js"></script>
<script src="/static/js/editor.js"></script>
<script>
    // Передаем проект в редактор
    const currentProject = "{{ project if project else '' }}";
    const editor = new HTREditor('c', "{{ filename }}", currentProject);
    
    // Инициализируем виджет статусов
    initStatusWidget(currentProject, "{{ filename }}");
</script>
</body>
</html>
