<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>HTR Project Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard">
    <div class="nav-header">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/">Yat</a>
            </div>
            <div class="nav-links">
                <a href="/" class="active">Проекты</a>
            </div>
            <div class="nav-actions">
                {% if USE_AUTH %}
                <span class="user-role-badge" style="margin-right:15px;font-size:0.85em;padding:4px 8px;background:{% if is_admin %}#28a745{% else %}#17a2b8{% endif %};color:white;border-radius:4px;">
                    {% if is_admin %}👤 Admin{% else %}👤 User{% endif %}
                </span>
                <a href="/logout" style="color:#dc3545;">Выйти</a>
                {% endif %}
                {% if is_admin %}
                <a href="#" onclick="openImportModal()">Импорт</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="main-content">

        <div class="dashboard-container">
            <div class="header">
                <h1>Менеджер проектов HTR</h1>
            </div>

            <div id="projects-section" class="section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="projects-count">0</div>
                        <div class="stat-label">Проекты</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="images-count">0</div>
                        <div class="stat-label">Изображения</div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                    <h2>Проекты</h2>
                    <div style="display: flex; gap: 10px;">
                        {% if is_admin %}
                        <button class="btn create-project-btn" onclick="openCreateProjectModal()">+ Создать проект</button>
                        {% endif %}
                    </div>
                </div>

                <div id="projects-container" class="projects-container-list">
                    <!-- Projects will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Create Project Modal -->
    <div id="createProjectModal" class="modal">
        <div class="modal-content">
            <h3>Создать новый проект</h3>
            <div class="form-group">
                <label for="project-name">Название проекта:</label>
                <input type="text" id="project-name" placeholder="Введите название проекта">
            </div>
            <div class="form-group">
                <label for="project-description">Описание:</label>
                <textarea id="project-description" rows="3" placeholder="Введите описание проекта"></textarea>
            </div>
            <div class="form-actions">
                <div class="btn-group">
                    <button class="btn" onclick="closeCreateProjectModal()">Отмена</button>
                    <button class="btn btn-primary" onclick="projectManager.createProjectFromModal()">Создать</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h3>Импорт проекта</h3>
            <div class="form-group">
                <label for="zipInput">ZIP файл:</label>
                <input type="file" id="zipInput" accept=".zip">
            </div>
            <div class="form-group">
                <label for="simplifyInput">Упрощение (px):</label>
                <input type="number" id="simplifyInput" value="5" min="0">
            </div>
            <div class="form-actions">
                <div class="btn-group">
                    <button class="btn" onclick="closeImportModal()">Отмена</button>
                    <button class="btn btn-primary" onclick="submitZipImport()">Импортировать</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Images to Project Modal -->
    <div id="addImagesModal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 1200px; height: 80vh; max-height: 700px;">
            <div class="modal-header">
                <h2>Добавить изображения в проект</h2>
                <span class="close" onclick="projectManager.closeAddImagesModal()">&times;</span>
            </div>
            <div class="modal-body" style="overflow-y: auto; height: calc(100% - 100px);">
                <div id="available-images-container" class="files-grid">
                    <!-- Available images will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/project_manager.js"></script>
</body>
</html>
