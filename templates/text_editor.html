<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Редактор распознавания - eScriptorium Style</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #222; 
            color: #ddd; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        #toolbar { 
            height: 50px; 
            background: #333; 
            border-bottom: 1px solid #444; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            gap: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            z-index: 100; 
            flex-shrink: 0; 
        }
        
        #workspace { 
            flex: 1; 
            display: flex; 
            overflow: hidden; 
        }
        
        .panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .panel.left {
            border-right: 1px solid #444;
        }
        
        .panel-title {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            z-index: 10;
        }
        
        .canvas-container {
            width: 100%;
            height: 100%;
        }
        
        #left-canvas, #right-canvas {
            display: block;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #333;
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 15px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .modal-footer {
            padding: 15px;
            border-top: 1px solid #444;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .region-preview {
            width: 100%;
            height: 300px;
            background: #222;
            border: 1px solid #444;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .region-preview img {
            max-width: 100%;
            max-height: 100%;
        }
        
        .text-input {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ddd;
            font-size: 1.2em;
            resize: vertical;
            box-sizing: border-box;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #007bff;
        }

        .format-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            padding: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        .format-btn {
            padding: 6px 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #ddd;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .format-btn:hover {
            background: #4a4a4a;
            border-color: #007bff;
        }

        .format-btn:active {
            background: #007bff;
            color: white;
        }

        .region-counter {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }
        
        .help-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            pointer-events: none;
            color: #ccc;
            z-index: 10;
        }

        /* Status widget styles */
        .status-badge { cursor: pointer; transition: opacity 0.2s; }
        .status-badge:hover { opacity: 0.8; }
        .status-crop { background: #ffc107; color: #212529; }
        .status-cropped { background: #6c757d; color: white; }
        .status-segment { background: #28a745; color: white; }
        .status-texted { background: #17a2b8; color: white; }
        .status-review_pending { background: #fd7e14; color: #212529; }
        .status-reviewed { background: #6f42c1; color: white; }
        
        .status-popover {
            display: none;
            position: fixed;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100000;
            width: 250px;
            color: #ddd;
        }
        .status-popover.show { display: block; }
        .status-popover h4 { margin: 0 0 10px 0; font-size: 0.9em; color: #fff; }
        .status-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px;
            cursor: pointer;
            border-radius: 4px;
            color: #ddd;
        }
        .status-option:hover { background: #3a3a3a; }
        .status-option input[type="radio"] { margin: 0; }
        .status-popover textarea {
            width: 100%;
            min-height: 60px;
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85em;
            resize: vertical;
            box-sizing: border-box;
            background: #333;
            color: #ddd;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .status-popover button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .status-popover button:hover { background: #0056b3; }
        
        /* Notification styles */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            color: white;
            z-index: 100001;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="btn" onclick="window.location.href='/'" title="Home">🏠</button>
        {% if project %}
            <button class="btn" onclick="window.location.href='/project/{{ project }}'" title="Назад к проекту">📋 Проект</button>
            <div class="sep"></div>
            <!-- Передаем тип инструмента строкой -->
            <button class="btn" onclick="editor.navigateTo('cropper')" title="Редактор обрезки">✂️ Обрезка</button>
            <button class="btn" onclick="editor.navigateTo('editor')" title="Редактор сегментов">📋 Сегменты</button>
        {% else %}
            <button class="btn" onclick="editor.navigateTo('cropper')" title="Редактор обрезки">✂️ Обрезка</button>
            <button class="btn" onclick="editor.navigateTo('editor')" title="Редактор сегментов">📋 Сегменты</button>
        {% endif %}
        <div class="sep"></div>
        <button class="btn" onclick="editor.goImage(-1)">&lt;</button>
        <button class="btn" onclick="editor.goImage(1)">&gt;</button>
        <span id="filename-display" class="file-info" style="font-size:0.9em; color:#aaa; max-width:200px; overflow:hidden; white-space:nowrap;">{{ filename }}</span>

        <div style="flex:1"></div>
        <button class="btn" id="btn-recognize" onclick="editor.recognizeText()">Распознать текст</button>
        <div class="sep"></div>
        <span id="status-badge" class="status-badge" onclick="statusWidget.openPopover()" style="cursor:pointer; padding:4px 8px; border-radius:4px; font-size:0.85em; font-weight:600;">Загрузка...</span>
    </div>

    <div id="workspace">
        <div class="panel left">
            <div class="panel-title">Оригинальное изображение</div>
            <div class="canvas-container">
                <canvas id="left-canvas"></canvas>
            </div>
            <div class="help-overlay">ЛКМ: ввод текста | ПКМ: панорамирование | Колесо: масштаб</div>
        </div>
        
        <div class="panel right">
            <div class="panel-title">Регионы для ввода текста</div>
            <div class="canvas-container">
                <canvas id="right-canvas"></canvas>
            </div>
            <div class="help-overlay">ЛКМ: ввод текста | ПКМ: панорамирование | Колесо: масштаб</div>
        </div>
    </div>

    <!-- Text Input Modal -->
    <div id="text-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ввод текста для региона</h3>
                <button class="btn" onclick="editor.closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="region-preview">
                    <img id="region-preview-img" src="" alt="Предпросмотр региона">
                </div>
                <div class="format-toolbar">
                    <button class="format-btn" onclick="editor.applyFormat('weak')" title="Слабое зачеркивание ~текст~">
                        слабое <s style="text-decoration-thickness: 1px">зачеркивание</s>
                    </button>
                    <button class="format-btn" onclick="editor.applyFormat('strong')" title="Сильное зачеркивание [текст]">
                        нечитаемое <s style="text-decoration-thickness: 3px">зачеркивание</s>
                    </button>
                </div>
                <textarea id="text-input" class="text-input" placeholder="Введите текст для этого региона..."></textarea>
                <div class="region-counter">Регион <span id="current-region-index">1</span> из <span id="total-regions">0</span></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="editor.closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="editor.saveTextAndNext()">Сохранить и следующий (Enter)</button>
            </div>
        </div>
    </div>

    <!-- Status popover -->
    <div id="status-popover" class="status-popover">
        <h4>Статус:</h4>
        <label class="status-option">
            <input type="radio" name="status" value="crop">
            Загружено
        </label>
        <label class="status-option">
            <input type="radio" name="status" value="cropped">
            Кадрировано
        </label>
        <label class="status-option">
            <input type="radio" name="status" value="segment">
            Размечено
        </label>
        <label class="status-option">
            <input type="radio" name="status" value="texted">
            Текст добавлен
        </label>
        <label class="status-option">
            <input type="radio" name="status" value="review_pending">
            Требует ревью
        </label>
        <label class="status-option">
            <input type="radio" name="status" value="reviewed">
            Проверено
        </label>
        <textarea id="status-comment" placeholder="Комментарий..."></textarea>
        <button>Сохранить</button>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/status_widget.js"></script>
    <script src="/static/js/text_editor.js"></script>
    <script>
        // Передаем также имя проекта, если оно есть, чтобы JS мог формировать ссылки
        // Используем '{{ project }}' или null/пустую строку
        const currentProject = "{{ project if project else '' }}";

        // Инициализируем виджет статусов
        initStatusWidget(currentProject, "{{ filename }}");

        // Инициализация с безопасной передачей имени файла
        const editor = new TextEditor(
            'left-canvas',
            'right-canvas',
            "{{ filename }}",
            currentProject
        );
    </script>
</body>
</html>
