<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .error-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
        }

        .error-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .error-icon {
            font-size: 60px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #dc3545;
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            color: #333;
            margin: 0 0 20px;
        }

        .error-message {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home:hover {
            background: #0056b3;
        }

        .btn-back {
            background: #6c757d;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: #545b62;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-header">
            <span class="error-icon">🔍</span>
            <h1 class="error-code">404</h1>
        </div>
        <h2 class="error-title">Страница не найдена</h2>
        <p class="error-message">
            К сожалению, страница, которую вы ищете, не существует или была перемещена.
        </p>
        
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn-home">
                <span>🏠</span>
                На главную
            </a>
            <a href="javascript:history.back()" class="btn-back">
                <span>←</span>
                Назад
            </a>
        </div>
    </div>
</body>
</html>
