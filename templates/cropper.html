<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Редактор обрезки</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body class="editor">

<div id="toolbar">
    <button class="btn" onclick="window.location.href='/'" title="Home">🏠</button>
    {% if project %}
        <button class="btn" onclick="window.location.href='/project/{{ project }}'" title="Назад к проекту">📋 Проект</button>
        <div class="sep"></div>
        <button class="btn" onclick="window.location.href='/editor?image={{ filename }}&project={{ project }}'" title="Редактор сегментов">📋 Сегменты</button>
        <button class="btn" onclick="window.location.href='/text_editor?image={{ filename }}&project={{ project }}'" title="Редактор распознавания">🔤 Распознать</button>
    {% else %}
        <button class="btn" onclick="window.location.href='/editor?image={{ filename }}'" title="Редактор сегментов">📋 Сегменты</button>
        <button class="btn" onclick="window.location.href='/text_editor?image={{ filename }}'" title="Редактор распознавания">🔤 Распознать</button>
    {% endif %}
    <div class="sep"></div>
    <button class="btn" onclick="goImage(-1)">&lt;</button>
    <button class="btn" onclick="goImage(1)">&gt;</button>
    <span style="font-size:0.9em; max-width:200px; white-space:nowrap; overflow:hidden; color:#aaa;">{{ filename }}</span>

    <div style="flex:1"></div>
    <div style="font-size:0.8em; color:#888; margin-right:15px;">
        Shift: Пропорции | ПКМ: Обзор
    </div>
    <button class="btn btn-primary" onclick="applyCrop()">✂️ Сохранить</button>
    <span id="status-badge" class="status-badge" onclick="statusWidget.openPopover()" style="cursor:pointer; padding:4px 8px; border-radius:4px; font-size:0.85em; font-weight:600; margin-left:10px;">Загрузка...</span>
</div>

<div id="workspace">
    <canvas id="c"></canvas>
</div>

<!-- Status popover -->
<div id="status-popover" class="status-popover dark">
    <h4>Статус:</h4>
    <label class="status-option">
        <input type="radio" name="status" value="uploaded">
        Загружено
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="cropped">
        Обрезано
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="segmented">
        Полигоны готовы
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="recognized">
        Текст распознан
    </label>
    <label class="status-option">
        <input type="radio" name="status" value="reviewed">
        Проверено
    </label>
    <textarea id="status-comment" placeholder="Комментарий..."></textarea>
    <button>Сохранить</button>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/status_widget.js"></script>
<script>
    const filename = "{{ filename }}";
    const project = "{{ project if project else '' }}";
    
    // Инициализируем виджет статусов
    initStatusWidget(project, filename);
    
    const canvas = new fabric.Canvas('c', {
        selection: false,
        backgroundColor: "#111",
        uniScaleKey: 'shiftKey',
        uniformScaling: false,
        fireRightClick: true,
        stopContextMenu: true,
        // Убираем "магнитный" эффект Retina-дисплеев
        enableRetinaScaling: false, 
        // Точность поиска цели (уменьшаем, чтобы не было прыжков при захвате)
        targetFindTolerance: 1 
    });

    let cropRect = null;
    let imgObj = null;
    let imageList = [];

    // Функция для поворота точки вокруг центра
    function rotate_pointJS(x, y, cx, cy, angle_deg) {
        const rad = angle_deg * Math.PI / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);

        const nx = cx + (x - cx) * cos - (y - cy) * sin;
        const ny = cy + (x - cx) * sin + (y - cy) * cos;
        return [nx, ny];
    }

    (async () => {
        resize();
        window.addEventListener('resize', resize);

        imageList = await API.listImages();

        fabric.Image.fromURL(`/data/originals/${filename}`, img => {
            imgObj = img;
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));

            fitImageHeight(img);
            loadExistingCropData();
        });
    })();

    function resize() {
        const el = document.getElementById('workspace');
        canvas.setWidth(el.clientWidth);
        canvas.setHeight(el.clientHeight);
    }

    function fitImageHeight(img) {
        const scale = (canvas.height / img.height) * 0.9;
        canvas.setZoom(scale);

        const vpt = canvas.viewportTransform;
        // Используем Math.floor или Math.round, чтобы избежать субпиксельного рендеринга
        vpt[4] = Math.floor((canvas.width - img.width * scale) / 2);
        vpt[5] = Math.floor((canvas.height - img.height * scale) / 2);
        canvas.requestRenderAll();
    }

    async function loadExistingCropData() {
        const data = await API.loadAnnotation(filename);
        let corners = [];

        if (data.crop_params && data.crop_params.corners && data.crop_params.corners.length > 0) {
            // Если есть углы в crop_params, используем их напрямую
            corners = data.crop_params.corners;
        } else if (data.processing_params && data.processing_params.quad_coords) {
            // Если параметры обработки существуют, восстанавливаем углы
            const procParams = data.processing_params;
            const quad_coords = procParams.quad_coords;

            corners = [
                {x: quad_coords[0], y: quad_coords[1]},  // верхний левый (TL)
                {x: quad_coords[6], y: quad_coords[7]},  // верхний правый (TR)
                {x: quad_coords[4], y: quad_coords[5]},  // нижний правый (BR)
                {x: quad_coords[2], y: quad_coords[3]}   // нижний левый (BL)
            ];
        } else if (data.crop_params && data.crop_params.x !== undefined) {
            // Если есть базовые параметры (x, y, w, h), вычисляем углы
            const cropParams = data.crop_params;
            const centerX = cropParams.x + cropParams.w / 2;
            const centerY = cropParams.y + cropParams.h / 2;
            const angle = cropParams.angle || 0;

            const unrotatedCorners = [
                {x: cropParams.x, y: cropParams.y},
                {x: cropParams.x + cropParams.w, y: cropParams.y},
                {x: cropParams.x + cropParams.w, y: cropParams.y + cropParams.h},
                {x: cropParams.x, y: cropParams.y + cropParams.h}
            ];

            corners = unrotatedCorners.map(corner => {
                const rotatedCorner = rotate_pointJS(corner.x, corner.y, centerX, centerY, angle);
                return {x: rotatedCorner[0], y: rotatedCorner[1]};
            });
        } else {
            // Если нет сохраненных параметров, создаем стандартный прямоугольник
            const margin = 0.05;
            const width = imgObj.width * (1 - 2 * margin);
            const height = imgObj.height * (1 - 2 * margin);

            corners = [
                {x: imgObj.width * margin, y: imgObj.height * margin},
                {x: imgObj.width * margin + width, y: imgObj.height * margin},
                {x: imgObj.width * margin + width, y: imgObj.height * margin + height},
                {x: imgObj.width * margin, y: imgObj.height * margin + height}
            ];
        }

        addCropRectFromCorners(corners);
    }

    function addCropRect(left, top, width, height, angle) {
        const z = canvas.getZoom();

        // Пересчитываем в центр, чтобы избежать математических перекосов
        const centerX = left + width / 2;
        const centerY = top + height / 2;

        cropRect = new fabric.Rect({
            left: centerX,
            top: centerY,
            width: width,
            height: height,
            angle: angle,

            originX: 'center',
            originY: 'center',

            fill: 'rgba(255, 255, 255, 0.0001)',
            stroke: 'yellow',
            strokeWidth: 2 / z,
            strokeUniform: true,

            objectCaching: false,

            transparentCorners: false,
            cornerColor: 'white',
            cornerStyle: 'circle',
            cornerSize: 3 / z
        });

        canvas.add(cropRect);
        canvas.setActiveObject(cropRect);

        cropRect.on('moving', function(e) {
            // Это гарантирует, что координаты рамки обновляются синхронно с каждым кадром
            this.setCoords();
            canvas.requestRenderAll();
        });
    }

    function addCropRectFromCorners(corners) {
        // Очищаем канвас от старых рамок
        if (cropRect) canvas.remove(cropRect);

        // Параметры для Fabric (координаты "мира" изображения)
        const centerX = corners.reduce((sum, c) => sum + c.x, 0) / 4;
        const centerY = corners.reduce((sum, c) => sum + c.y, 0) / 4;
        
        const width = Math.sqrt(Math.pow(corners[0].x - corners[1].x, 2) + Math.pow(corners[0].y - corners[1].y, 2));
        const height = Math.sqrt(Math.pow(corners[1].x - corners[2].x, 2) + Math.pow(corners[1].y - corners[2].y, 2));
        
        const dx = corners[1].x - corners[0].x;
        const dy = corners[1].y - corners[0].y;
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

        const z = canvas.getZoom();

        // Вычисляем размеры с теми же ограничениями что и при зуме
        const strokeWidth = Math.max(1, Math.min(3, 2 / z));
        const cornerSize = Math.max(4, Math.min(20, 10 / z));

        cropRect = new fabric.Rect({
            left: centerX,
            top: centerY,
            width: width,
            height: height,
            angle: angle,
            originX: 'center',
            originY: 'center',
            fill: 'rgba(255, 255, 0, 0.1)',
            stroke: 'yellow',
            strokeWidth: strokeWidth,
            strokeUniform: true,
            cornerSize: cornerSize,
            transparentCorners: false,
            cornerColor: 'white',
            cornerStyle: 'circle'
        });

        canvas.add(cropRect);
        canvas.setActiveObject(cropRect);
        canvas.requestRenderAll();
    }
    


    canvas.on('mouse:wheel', (opt) => {
        let zoom = canvas.getZoom();
        zoom *= 0.995 ** opt.e.deltaY;
        if (zoom > 20) zoom = 20;
        if (zoom < 0.01) zoom = 0.01;
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);

        if(cropRect) {
            // Обновляем толщину обводки и размер углов так, чтобы они оставались 
            // визуально одинакового размера при любом зуме (с ограничением 4-20px)
            const strokeWidth = Math.max(1, Math.min(3, 2 / zoom));
            const cornerSize = Math.max(4, Math.min(20, 10 / zoom));
            cropRect.set('strokeWidth', strokeWidth);
            cropRect.set('cornerSize', cornerSize);
            canvas.requestRenderAll();
        }
        opt.e.preventDefault();
        opt.e.stopPropagation();
    });

    let isPanning = false, lastMouse = {x:0, y:0};
    canvas.on('mouse:down', opt => {
        if(opt.e.button===2 || opt.e.altKey) {
            isPanning=true; lastMouse={x:opt.e.clientX, y:opt.e.clientY};
            canvas.defaultCursor = 'grab';
        }
    });
    canvas.on('mouse:move', opt => {
        if(isPanning) {
            canvas.relativePan(new fabric.Point(opt.e.clientX-lastMouse.x, opt.e.clientY-lastMouse.y));
            lastMouse={x:opt.e.clientX, y:opt.e.clientY};
            if(cropRect) {
                cropRect.setCoords(); // Обновляем позицию границ
            }
        }
    });
    canvas.on('mouse:up', () => { 
        if(isPanning) {
            isPanning=false; 
            canvas.defaultCursor = 'default';
            canvas.setViewportTransform(canvas.viewportTransform);
            if(cropRect) cropRect.setCoords();
        }
    });
    document.oncontextmenu = () => false;

    async function applyCrop() {
        if (!cropRect) return;

        // 1. Получаем текущую матрицу трансформации канваса
        const vpt = canvas.viewportTransform;
        // 2. Инвертируем её, чтобы переводить из "экранных" координат в "координаты изображения"
        const invVpt = fabric.util.invertTransform(vpt);

        // 3. Берем экранные координаты углов рамки (oCoords содержит tl, tr, br, bl)
        // Важно: oCoords - это текущие координаты на экране после всех перемещений
        const coords = cropRect.oCoords;

        const getImgPoint = (pt) => {
            const p = fabric.util.transformPoint({ x: pt.x, y: pt.y }, invVpt);
            return { x: Math.round(p.x), y: Math.round(p.y) };
        };

        const cropData = {
            // Строгий порядок: Top-Left, Top-Right, Bottom-Right, Bottom-Left
            corners: [
                getImgPoint(coords.tl),
                getImgPoint(coords.tr),
                getImgPoint(coords.br),
                getImgPoint(coords.bl)
            ]
        };

        const url = project ? `/api/crop?project=${encodeURIComponent(project)}` : '/api/crop';
        const resp = await fetch(url, {
            method: 'POST',
            headers: API.getCsrfHeaders(),
            body: JSON.stringify({ image_name: filename, box: cropData })
        });

        if (resp.ok) {
            goImage(1);
        } else {
            alert('Ошибка при сохранении');
        }
    }

    function goImage(dir) {
        const idx = imageList.indexOf(filename);
        if (idx === -1) return;
        const newIdx = (idx + dir + imageList.length) % imageList.length;
        const newUrl = project 
            ? `?image=${imageList[newIdx]}&project=${encodeURIComponent(project)}`
            : `?image=${imageList[newIdx]}`;
        window.location.href = newUrl;
    }
</script>
</body>
</html>
